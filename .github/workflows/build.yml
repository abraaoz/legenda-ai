name: build

# Compila o app com Electrobun em cada SO nativo (macOS arm64/Intel, Windows,
# Linux). Ao dar push de uma tag "v*", publica um Release com os artefatos
# (.dmg, instaladores, tarballs de update e update.json).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15 (arm64) tem o SDK do macOS 15 → compila o helper Apple
          # (framework Translation). O Intel fica no macos-13 (último runner
          # Intel padrão); lá o helper Apple é pulado (postBuild resiliente).
          - { name: macos-arm64, os: macos-15 }
          - { name: macos-intel, os: macos-13 }
          - { name: windows-x64, os: windows-latest }
          - { name: linux-x64, os: ubuntu-22.04 }
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # A webview do Electrobun no Linux usa WebKitGTK do sistema em runtime.
      - name: Instalar WebKitGTK (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 libgtk-3-0

      - name: Instalar dependências
        run: bun install --frozen-lockfile

      - name: Checagem de tipos
        run: bun run typecheck

      # Baixa os binários core do Electrobun e gera os artefatos de distribuição.
      - name: Build (stable)
        run: bun run build:stable

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publicar release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Criar release com os artefatos
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
