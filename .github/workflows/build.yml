name: build

# Compila o app com Electrobun em cada SO nativo (macOS arm64, Windows, Linux).
# Ao dar push de uma tag "v*", publica um Release com os artefatos
# (.dmg, instaladores, tarballs de update e update.json).
# Nota: sem macOS Intel — os runners macos-13 (último Intel padrão) estão
# escassos/em descontinuação e travam a fila; foco em Apple Silicon.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Publicar release com esta tag (ex.: v1.0.0). Vazio = só buildar, sem release.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15 (arm64) tem o SDK do macOS 15 → compila o helper Apple
          # (framework Translation) e o embute no bundle.
          - { name: macos-arm64, os: macos-15 }
          - { name: windows-x64, os: windows-latest }
          - { name: linux-x64, os: ubuntu-22.04 }
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # A webview do Electrobun no Linux usa WebKitGTK do sistema em runtime.
      - name: Instalar WebKitGTK (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 libgtk-3-0

      - name: Instalar dependências
        run: bun install --frozen-lockfile

      - name: Checagem de tipos
        run: bun run typecheck

      # Baixa os binários core do Electrobun e gera os artefatos de distribuição.
      - name: Build (stable)
        run: bun run build:stable

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publicar release
    # Publica ao dar push de uma tag v*, OU num dispatch manual com release_tag preenchido.
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Criar release com os artefatos
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          # Na tag: usa a própria tag. No dispatch: usa o input (cria a tag no commit atual).
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          generate_release_notes: true
